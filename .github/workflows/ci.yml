name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  integration:
    name: Integration Tests (Anvil + Forge)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          # `foundry.paradigm.xyz` installs `foundryup`, but it may not be on PATH
          # in the current GH Actions shell session.
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          if [ -x "$HOME/.foundry/bin/foundryup" ]; then
            "$HOME/.foundry/bin/foundryup"
          elif [ -x "$HOME/.cargo/bin/foundryup" ]; then
            "$HOME/.cargo/bin/foundryup"
          elif [ -x "$HOME/.local/bin/foundryup" ]; then
            "$HOME/.local/bin/foundryup"
          else
            echo "foundryup binary not found after install" >&2
            ls -la "$HOME/.foundry/bin" "$HOME/.cargo/bin" "$HOME/.local/bin" 2>/dev/null || true
            exit 1
          fi
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: |
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$PATH"
          command -v anvil
          anvil --version
          npm run test:integration

