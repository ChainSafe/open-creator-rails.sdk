name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  CI:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  integration:
    name: Integration Tests (Anvil + Forge)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        run: |
          set -e
          curl -L https://foundry.paradigm.xyz | bash
          # The installer may only update PATH in `~/.bashrc` (per its own output).
          # In GitHub Actions, that file isn't sourced automatically in the current shell.
          # shellcheck disable=SC1090
          if [ -f "$HOME/.bashrc" ]; then . "$HOME/.bashrc"; fi

          # Ensure Foundry toolchain binaries are on PATH for the remainder of this step.
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"

          # Run `foundryup` from a known install location so we don't depend on shell PATH.
          if [ -x "$HOME/.foundry/bin/foundryup" ]; then
            "$HOME/.foundry/bin/foundryup"
          elif [ -x "$HOME/.cargo/bin/foundryup" ]; then
            "$HOME/.cargo/bin/foundryup"
          elif [ -x "$HOME/.local/bin/foundryup" ]; then
            "$HOME/.local/bin/foundryup"
          else
            foundryup
          fi

          # Verify toolchain binaries required by the integration tests.
          if [ ! -x "$HOME/.foundry/bin/anvil" ] || [ ! -x "$HOME/.foundry/bin/forge" ]; then
            echo "Required Foundry binaries missing after install" >&2
            exit 1
          fi

          echo "$HOME/.foundry/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: |
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$PATH"
          anvil --version
          npm run test:integration

